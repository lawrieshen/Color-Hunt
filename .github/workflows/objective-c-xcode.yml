name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyse
    # TODO: switch to a runner that ships Xcode 26 once it is stable.
    # macos-latest currently provides Xcode 16.x, which cannot build
    # a project with IPHONEOS_DEPLOYMENT_TARGET = 26.2.
    # Until then this workflow will fail on GitHub-hosted runners.
    # For local verification use a self-hosted runner with Xcode 26.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build and Analyze
        shell: bash
        run: |
          set -o pipefail
          xcodebuild clean build analyze \
            -project PicCollage_Clone.xcodeproj \
            -scheme PicCollage_Clone \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
